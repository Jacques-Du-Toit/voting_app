<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting App</title>
</head>
<body>
    <main class="container">
        <div id="lobby_screen">
            <div id="ready_bar">
                <button type="button" id="ready_btn">Ready</button>
                <h3 id="player_count_display">0/1</h3>
                <h3 id="lobby_title" class="centered-text">Options</h3>
                <button type="button" id="next_btn" disabled>Next</button>
            </div>
            <form id="option_form">
                <input type="text" id="add_option_box" maxlength="50">
                <button type="submit">Add Option</button>
            </form>
            <ul id="options_list"></ul>
        </div>
        <div id="voting_screen" class="hidden"></div>
        <div id="ranked_voting_screen" class="hidden">
            <h3 id="ranked_voting_title" class="centered-text">Rank Options</h3>
        </div>
        <div id="results_screen" class="hidden">
            <h3 id="results_title" class="centered-text">Results</h3>
            <table id="results_table" class="striped">
                <thead>
                    <tr>
                        <th scope="col">Option</th>
                        <th scope="col">Max</th>
                        <th scope="col">Avg</th>
                        <th scope="col">Var</th>
                        <th scope="col">Min</th>
                    </tr>
                </thead>
                <tbody id="results_table_body"></tbody>
            </table>
        </div>
        <h3 id="room_title" class="centered-bottom-text"></h3>
        <script type="module" src="/socket.js?v=8"></script>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</body>
</html>
